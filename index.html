<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FoodZee – Gut Health Quiz</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="screen">

<!-- SHARED: back btn + progress (injected into every quiz-top) -->
<template id="tpl-header">
  <div class="quiz-header-row">
    <button class="back-btn" aria-label="Back" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18L9 12L15 6"/>
      </svg>
    </button>
    <div class="progress-segs">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════
     S1 — Landing
═══════════════════════════════════════ -->
<div class="screen-inner" id="s1">
  <div class="landing-hero">
    <div class="landing-logo">
      <img class="logo-icon" src="assets/logo.svg" alt="FoodZee">
      <span class="logo-text">FoodZee</span>
    </div>
    <h1 class="landing-title" data-i18n="s1.title"></h1>
    <p class="landing-sub" data-i18n="s1.subtitle"></p>
    <div class="social-proof-pill">
      <span class="sp-dot"></span>
      <span data-i18n="s1.socialProof"></span>
    </div>
    <button class="primary-btn" id="s1-cta" data-i18n="s1.cta"></button>
    <p class="landing-fine" data-i18n="s1.fine"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════
     S2 — Main Concern
═══════════════════════════════════════ -->
<div class="screen-inner hidden" id="s2" data-quiz="1">
  <div class="quiz-top"></div>
  <div class="quiz-text">
    <h1 class="title" data-i18n="s2.title"></h1>
    <p class="subtitle" data-i18n="s2.subtitle"></p>
  </div>
  <div class="options">
    <button class="option" data-key="concern" data-value="bloating"><span class="emoji">🫧</span> <span data-i18n="s2.option.bloating"></span></button>
    <button class="option" data-key="concern" data-value="irregularity"><span class="emoji">⏰</span> <span data-i18n="s2.option.irregularity"></span></button>
    <button class="option" data-key="concern" data-value="discomfort"><span class="emoji">😣</span> <span data-i18n="s2.option.discomfort"></span></button>
    <button class="option" data-key="concern" data-value="general"><span class="emoji">🥗</span> <span data-i18n="s2.option.nutrition"></span></button>
  </div>
</div>

<!-- ═══════════════════════════════════════

═══════════════════════════════════════ -->

</div>

    </div>
  </div>
  <h2 class="section-title how-title" data-i18n="ts.how.title"></h2>
  <div class="steps-list">
    <div class="step-item">
      <div class="step-num">1</div>
      <div class="step-body"><p class="step-title" data-i18n="ts.how.step1Title"></p><p class="step-desc" data-i18n="ts.how.step1Desc"></p></div>
    </div>
    <div class="step-item">

        <input type="email" id="pay-email" data-i18n-placeholder="s22.emailPlaceholder">
      </div>
      <div class="form-group">
        <label data-i18n="s22.cardNumber"></label>
        <input type="text" id="pay-card" data-i18n-placeholder="s22.cardPlaceholder" maxlength="19" oninput="formatCard(this)">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="s22.expiry"></label>
          <input type="text" id="pay-expiry" data-i18n-placeholder="s22.expiryPlaceholder" maxlength="7" oninput="formatExpiry(this)">
        </div>
        <div class="form-group">
          <label data-i18n="s22.cvc"></label>
          <input type="text" id="pay-cvc" data-i18n-placeholder="s22.cvcPlaceholder" maxlength="3" inputmode="numeric">
        </div>
      </div>
      <button class="primary-btn" onclick="submitPayment()" data-i18n="s22.cta"></button>
    </div>
    <div class="payment-security" data-i18n="s22.security"></div>
    <p class="payment-fine" data-i18n="s22.fine"></p>
  </div>
</div>
